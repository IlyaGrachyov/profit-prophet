name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

      - name: Update dist folder in repository
        if: github.actor != 'github-actions[bot]'
        run: |
          rm -rf dist
          npm run build
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f dist
          if git diff --cached --quiet; then
            echo "No dist changes"
          else
            git commit -m "chore: update dist [skip ci]"
            git push
          fi

      - name: Create site archive
        run: cd dist && zip -r ../marketing-gid-site.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: marketing-gid-site
          path: marketing-gid-site.zip

      - name: Create Release with site archive
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Готовый сайт (последняя версия)"
          body: "Скачайте marketing-gid-site.zip, распакуйте и откройте index.html"
          files: marketing-gid-site.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
